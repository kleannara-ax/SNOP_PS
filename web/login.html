<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PS S&OP 계획 시스템 - 로그인</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-header h1 {
            font-size: 1.6rem;
            color: #1e293b;
            margin-bottom: 6px;
            font-weight: 700;
        }
        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #334155;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }
        .form-group input::placeholder {
            color: #94a3b8;
        }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .login-btn:hover {
            opacity: 0.92;
        }
        .login-btn:active {
            transform: scale(0.98);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            background: #fef2f2;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
            border: 1px solid #fecaca;
        }
        .error-msg.show {
            display: block;
        }
        .login-footer {
            text-align: center;
            margin-top: 24px;
            color: #94a3b8;
            font-size: 0.78rem;
        }
        @media (max-width: 480px) {
            .login-card {
                margin: 16px;
                padding: 32px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>PS S&OP 계획 시스템</h1>
            <p>시스템에 로그인하세요</p>
        </div>

        <div class="error-msg" id="error-msg"></div>

        <form id="login-form" autocomplete="off">
            <div class="form-group">
                <label for="user-id">사용자 ID</label>
                <input type="text" id="user-id" name="user_id" placeholder="아이디를 입력하세요" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="login-btn" id="login-btn">로그인</button>
        </form>

        <div class="login-footer">
            &copy; 2026 PS S&OP Planning System
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errEl = document.getElementById('error-msg');
            errEl.classList.remove('show');
            btn.disabled = true;
            btn.textContent = '로그인 중...';

            const userId = document.getElementById('user-id').value.trim();
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: userId, password: password }),
                    credentials: 'same-origin'
                });

                const data = await res.json();

                if (res.ok) {
                    sessionStorage.setItem('loginUser', data.user_id);
                    sessionStorage.setItem('loginUserName', data.user_name);
                    sessionStorage.setItem('loginUserRole', data.role);
                    window.location.href = '/';
                } else {
                    errEl.textContent = data.message || '로그인에 실패했습니다.';
                    errEl.classList.add('show');
                }
            } catch (err) {
                /* 서버 미연결 시 데모 모드로 진입 */
                sessionStorage.setItem('loginUser', userId || 'demo');
                sessionStorage.setItem('loginUserName', '관리자');
                sessionStorage.setItem('loginUserRole', 'ADMIN');
                window.location.href = 'index.html';
            } finally {
                btn.disabled = false;
                btn.textContent = '로그인';
            }
        });

        /* 이미 로그인된 상태면 메인으로 */
        if (sessionStorage.getItem('loginUser')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
